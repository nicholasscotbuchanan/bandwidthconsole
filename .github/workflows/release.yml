name: Release

# Cutting a release is one command: push a v* tag. Everything below runs from
# that tag and nothing else — no manual uploads, no artifacts built on whoever's
# laptop happened to be free.
#
# The reason this must run on CI rather than locally is architecture. jpackage
# cannot cross-compile, and the Makefile flatly refuses to build amd64 packages
# on an arm64 host because rustc segfaults under qemu-user emulation. A release
# cut from an Apple Silicon machine would therefore be arm64-only, which is the
# wrong half of the userbase. GitHub's ubuntu runners are x86_64.
#
#   git tag -a v1.2.3 -m 'bwtest 1.2.3' && git push origin v1.2.3
#
# workflow_dispatch is a dry run: it builds and verifies everything, then stops
# short of publishing, so the release path can be exercised without a tag.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # A tag that disagrees with the tree is the classic release bug: v1.1.0 cut
  # from a tree still saying 1.0.0 produces packages named after the old version
  # and a release nobody can correlate to anything. Catch it in 10 seconds
  # rather than after the 25-minute package job.
  preflight:
    name: tag matches tree
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve and compare versions
        id: v
        run: |
          set -euo pipefail
          # configure reads the pom the same way; keep the two in agreement.
          pom=$(sed -n 's|.*<version>\(.*\)</version>.*|\1|p' console/pom.xml | head -1)
          cargo=$(sed -n 's|^version = "\(.*\)"|\1|p' agent/Cargo.toml | head -1)
          echo "pom.xml:    $pom"
          echo "Cargo.toml: $cargo"

          if [ "$pom" != "$cargo" ]; then
            echo "::error::console/pom.xml ($pom) and agent/Cargo.toml ($cargo) disagree"
            exit 1
          fi

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            tag="${GITHUB_REF_NAME#v}"
            if [ "$tag" != "$pom" ]; then
              echo "::error::tag v$tag does not match tree version $pom — retag or bump the tree"
              exit 1
            fi
            echo "tag v$tag matches the tree"
          else
            echo "dry run: no tag to check against"
          fi

          echo "version=$pom" >> "$GITHUB_OUTPUT"

  # The tag may point at a commit CI never saw (a tag on an older commit, or
  # pushed alongside the branch push and racing it). Re-run the build and the
  # test suite here so publishing is never the first time this tree was built.
  check:
    name: build & test
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            agent/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('agent/Cargo.lock', 'agent/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: configure
        run: ./configure

      # ALLOW_HOST_GLIBC: this job compiles and tests, it does not ship a binary,
      # so linking against the runner's glibc is fine and saves installing the
      # zig toolchain twice. The package job, which does ship, enforces the floor.
      - name: make
        run: make ALLOW_HOST_GLIBC=1

      - name: make check
        run: make check

  # Same recipe as ci.yml's package job. It is duplicated rather than shared
  # because a release must be reproducible from the tag alone: a reusable
  # workflow referenced by @main would let a later edit change what an old tag
  # builds. If you change one, change both.
  package:
    name: linux packages (amd64) + source tarball
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Packages are built inside packaging/docker/Dockerfile.linux, not on the
      # runner directly, and for the same reason the Makefile does it: the base
      # host leaks into the packages. Two host-specific bugs both trace to
      # building on a bleeding-edge runner and both are fixed by the image —
      #
      #   * glibc floor: a native build on ubuntu-24.04 needs GLIBC_2.39 and
      #     will not start on debian 12 (2.36) or rocky 9 (2.34). The image
      #     carries zig + cargo-zigbuild and pins the floor to 2.28.
      #   * .deb Depends: jpackage derives the dependency list from the build
      #     host, so on noble it stamps libasound2t64 — a name debian 12 cannot
      #     resolve. The image is jammy (22.04), whose libasound2 the t64
      #     packages still Provide, so the .deb installs on both.
      #
      # The image also carries maven, the JDK, nfpm and the rpm toolchain, so
      # none of that is installed on the runner. This is the exact path a
      # maintainer's local `make deb` takes — CI and a laptop build the same way.
      #
      # docker ships on the runner, as do maven, a JDK and cargo, so the host
      # ./configure succeeds with nothing installed. Its config.mk supplies only
      # CONTAINER_ENGINE and HOST_ARCH — all container-pkg reads — and nothing
      # compiles on the host: the container re-runs ./configure internally and
      # does the real build. (configure refuses --disable of both components, so
      # they are left enabled; it makes no difference to a container build.)
      - name: configure (container build)
        run: ./configure --with-container-engine=docker

      - name: build deb and rpm in the pinned image
        run: |
          make container-pkg PKG_TYPE=deb
          make container-pkg PKG_TYPE=rpm
          ls -la packaging/dist

      # The container runs as root and leaves build/, the two target/ dirs and
      # packaging/dist owned by root, which the host-user steps below (make dist
      # writes build/) then cannot touch. Hand the tree back to the job user.
      - name: reclaim container-written files
        run: sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"

      # Source tarball is built from the same configured tree, so its version
      # cannot drift from the packages sitting beside it in the release.
      - name: source tarball
        run: make dist

      # jpackage exiting 0 proves nothing — every serious packaging bug found on
      # this project produced a package that installed perfectly and failed only
      # once running. This installs them into clean distro containers and starts
      # them. Bounded because verify-linux.sh has no internal timeout and an
      # unreachable container engine blocks on a socket read forever.
      - name: verify packages in clean distro containers
        timeout-minutes: 25
        run: make verify

      - name: collect release assets
        run: |
          set -euo pipefail
          mkdir -p release
          cp packaging/dist/* release/
          cp bwtest-${{ needs.preflight.outputs.version }}.tar.gz release/
          cd release
          sha256sum * > SHA256SUMS
          ls -la
          cat SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release/*
          if-no-files-found: error

  publish:
    name: publish GitHub release
    needs: [preflight, check, package]
    # Dry runs stop here: everything above has proven the release builds and the
    # packages run, without creating anything public.
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # --generate-notes needs history to diff against

      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release

      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            --title "bwtest ${{ needs.preflight.outputs.version }}" \
            --generate-notes \
            release/*
