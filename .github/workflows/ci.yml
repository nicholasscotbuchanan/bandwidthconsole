name: CI

# The build chain this drives is the same one a developer runs by hand:
#
#   ./configure  ->  make  ->  Maven (console) + Cargo (agent)
#
# CI deliberately calls configure and make rather than mvn/cargo directly. If it
# shortcut straight to the two language tools, the Makefile and configure could
# rot without anything noticing — and they are what an operator building from a
# release tarball actually uses.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A force-push mid-run should cancel the superseded run, not race it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      # JDK 21+ is configure's floor: it needs jpackage and jdeps, not just javac.
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            agent/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('agent/Cargo.lock', 'agent/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: configure
        run: ./configure

      # Surfaced on its own so a failure here is obviously a configure problem
      # rather than a compile one.
      - name: show configuration
        run: make help

      # ALLOW_HOST_GLIBC: this job compiles and tests, it does not ship a binary,
      # so linking against the runner's glibc is fine and saves installing the
      # zig toolchain twice. The package job, which does ship, enforces the floor.
      - name: make
        run: make ALLOW_HOST_GLIBC=1

      - name: make check
        run: make check

  # The unit suites do not exercise the agent<->console wire protocol; only a
  # real run does. This is the job that catches a message or field renamed on
  # one side and not the other.
  smoke:
    name: headless wire smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            agent/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('agent/Cargo.lock', 'agent/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ALLOW_HOST_GLIBC: the smoke agent runs on this runner and nowhere else.
      - name: configure & build agent
        run: ./configure && make agent ALLOW_HOST_GLIBC=1

      # mock_console.py drives a genuine run between two agents and exits
      # non-zero unless it sees telemetry and a well-formed summary.
      - name: large-file run
        timeout-minutes: 5
        run: |
          cd agent
          SC_DUR=3 python3 tests/mock_console.py 9077 > smoke.log 2>&1 &
          console_pid=$!
          sleep 1
          ./target/release/bwagent --console 127.0.0.1:9077 --name A &
          ./target/release/bwagent --console 127.0.0.1:9077 --name B &
          wait $console_pid
          status=$?
          cat smoke.log
          exit $status

      - name: multi-file (frametest) run
        timeout-minutes: 10
        run: |
          cd agent
          mkdir -p /tmp/frames-a /tmp/frames-dst
          # Small on purpose: this asserts the frame path is wired end to end,
          # not that the runner has fast disks. The default 4K x 1800 preset
          # would stage ~92 GB.
          SC_MODE=MultiFile SC_STORAGE=Disk SC_FRAME_MODE=Write \
          SC_FRAME_BYTES=1048576 SC_FRAME_COUNT=200 SC_THREADS=4 \
          SC_FRAME_PATH=/tmp/frames-a SC_DEST_PATH=/tmp/frames-dst \
            python3 tests/mock_console.py 9077 > frames.log 2>&1 &
          console_pid=$!
          sleep 1
          ./target/release/bwagent --console 127.0.0.1:9077 --name A &
          ./target/release/bwagent --console 127.0.0.1:9077 --name B &
          wait $console_pid
          status=$?
          cat frames.log
          exit $status

  # Packaging is the part most likely to break and the part a developer is least
  # likely to run locally: it needs the JavaFX jmods, and its failures (a missing
  # JDK module, a glibc floor, an undeclared GTK dep) produce packages that build
  # and install perfectly and fail only once running. Build them, then install
  # them into clean distro containers and check they actually start.
  package:
    name: packages (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Packages are built inside packaging/docker/Dockerfile.linux, not on the
      # runner directly, and for the same reason the Makefile does it: the base
      # host leaks into the packages. Two host-specific bugs both trace to
      # building on a bleeding-edge runner and both are fixed by the image —
      #
      #   * glibc floor: a native build on ubuntu-24.04 needs GLIBC_2.39 and
      #     will not start on debian 12 (2.36) or rocky 9 (2.34). The image
      #     carries zig + cargo-zigbuild and pins the floor to 2.28.
      #   * .deb Depends: jpackage derives the dependency list from the build
      #     host, so on noble it stamps libasound2t64 — a name debian 12 cannot
      #     resolve. The image is jammy (22.04), whose libasound2 the t64
      #     packages still Provide, so the .deb installs on both.
      #
      # The image also carries maven, the JDK, nfpm and the rpm toolchain, so
      # none of that is installed on the runner. This is the exact path a
      # maintainer's local `make deb` takes — CI and a laptop build the same way.
      #
      # docker ships on the runner, as do maven, a JDK and cargo, so the host
      # ./configure succeeds with nothing installed. Its config.mk supplies only
      # CONTAINER_ENGINE and HOST_ARCH — all container-pkg reads — and nothing
      # compiles on the host: the container re-runs ./configure internally and
      # does the real build. (configure refuses --disable of both components, so
      # they are left enabled; it makes no difference to a container build.)
      - name: configure (container build)
        run: ./configure --with-container-engine=docker

      - name: build deb and rpm in the pinned image
        run: |
          make container-pkg PKG_TYPE=deb
          make container-pkg PKG_TYPE=rpm
          ls -la packaging/dist

      # The container runs as root and leaves build/, the two target/ dirs and
      # packaging/dist owned by root, which the host-user steps below then
      # cannot touch. Hand the tree back to the job user.
      - name: reclaim container-written files
        run: sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"

      # A Makefile-behaviour regression test, independent of the build path
      # above: agent-pkg must error when nfpm is absent rather than reporting
      # success having produced no agent package. nfpm lives only in the image,
      # never on the runner, so the host is already the missing-nfpm case.
      - name: missing-nfpm guard must fail loudly
        run: |
          set -euo pipefail
          if make agent-pkg PKG_TYPE=deb >/dev/null 2>&1; then
            echo "::error::agent-pkg succeeded without nfpm — the guard regressed"
            exit 1
          fi
          echo "guard held: agent-pkg fails when nfpm is absent"

      # Bounded: verify-linux.sh has no internal timeout, and an unreachable
      # container engine leaves it blocked on a socket read forever rather than
      # failing. A hung job is worse than a failed one — it tells you nothing
      # and burns a runner until the job limit.
      - name: verify packages in clean distro containers
        timeout-minutes: 25
        run: make verify

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-packages
          path: packaging/dist/*
          if-no-files-found: error

  # ADVISORY ONLY — this job reports but never fails the build.
  #
  # As of adding this workflow the agent has ~25 clippy findings and does not
  # match rustfmt, so making either blocking would red-X every PR on day one for
  # reasons unrelated to the change under review. The job exists to make that
  # backlog visible and to stop it growing silently. Drop the two
  # continue-on-error lines once the tree is clean — that is the point of it.
  lint:
    name: clippy & fmt (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: cargo fmt
        working-directory: agent
        run: cargo fmt --check
        continue-on-error: true

      - name: cargo clippy
        working-directory: agent
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true
